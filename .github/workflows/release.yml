name: "publish"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/README.md'
      - 'update.json'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.release_meta.outputs.release_version }}
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v5

      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Compute release version
        id: release_meta
        shell: bash
        run: |
          RELEASE_VERSION=$(node -p 'require("./package.json").version')
          TAG_NAME="app-v${RELEASE_VERSION}"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "Using release version $RELEASE_VERSION"

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.release_version }}
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          NOTES_FILE=$(mktemp)
          node .github/scripts/extract-release-notes.js > "$NOTES_FILE"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "Brows3 v$RELEASE_VERSION" \
              --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG_NAME" \
              --title "Brows3 v$RELEASE_VERSION" \
              --notes-file "$NOTES_FILE"
          fi

  publish-tauri:
    if: github.actor != 'github-actions[bot]'
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Apple Silicon
            args: "--target aarch64-apple-darwin --bundles app,dmg"
          - platform: "macos-latest" # for Intel
            args: "--target x86_64-apple-darwin --bundles app,dmg"
          - platform: "ubuntu-22.04" # for Linux
            args: ""
          - platform: "ubuntu-22.04-arm" # for Linux ARM64
            args: ""
          - platform: "windows-latest" # for Windows
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos-latest
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
          sudo apt-get install -y libwebkit2gtk-4.1-dev

      - name: install WiX v4 (windows only)
        if: matrix.platform == 'windows-latest'
        run: dotnet tool install --global wix

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute release version
        shell: bash
        run: |
          RELEASE_VERSION="${{ needs.prepare-release.outputs.release_version }}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          echo "Using release version $RELEASE_VERSION"

      - name: Sync release versions
        run: node scripts/sync-release-version.js "$RELEASE_VERSION"

      - name: Verify Signing Key
        shell: bash
        run: |
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required for signed desktop updates."
            exit 1
          else
            echo "✅ TAURI_SIGNING_PRIVATE_KEY is configured"
          fi

      - name: Build desktop bundles
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          pnpm tauri build ${{ matrix.args }}

      - name: Create Windows portable zip
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          PORTABLE_DIR="src-tauri/target/release/bundle/portable/Brows3_${RELEASE_VERSION}_x64-portable"
          mkdir -p "$PORTABLE_DIR"
          cp src-tauri/target/release/brows3.exe "$PORTABLE_DIR/Brows3.exe"
          touch "$PORTABLE_DIR/brows3.portable"
          7z a "src-tauri/target/release/bundle/portable/Brows3_${RELEASE_VERSION}_x64-portable.zip" "$PORTABLE_DIR"/*

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          FILES=()
          while IFS= read -r -d '' file; do
            FILES+=("$file")
          done < <(find src-tauri/target -type f \
            \( \
              -path '*/bundle/msi/*' -o \
              -path '*/bundle/nsis/*' -o \
              -path '*/bundle/portable/*' -o \
              -path '*/bundle/appimage/*' -o \
              -path '*/bundle/deb/*' -o \
              -path '*/bundle/dmg/*' -o \
              -path '*/bundle/macos/*' \
            \) \
            \( \
              -name '*.msi' -o -name '*.msi.sig' -o -name '*.msi.zip' -o -name '*.msi.zip.sig' -o \
              -name '*-setup.exe' -o -name '*-setup.exe.sig' -o -name '*.nsis.zip' -o -name '*.nsis.zip.sig' -o \
              -name '*-portable.zip' -o \
              -name '*.AppImage' -o -name '*.AppImage.sig' -o \
              -name '*.deb' -o -name '*.deb.sig' -o \
              -name '*.dmg' -o -name '*.dmg.sig' -o \
              -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \
            \) -print0)

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "::error::No release artifacts were generated."
            exit 1
          fi

          printf 'Uploading %s\n' "${FILES[@]}"
          gh release upload "$TAG_NAME" "${FILES[@]}" --clobber

  update-manifest:
    if: github.actor != 'github-actions[bot]'
    needs:
      - prepare-release
      - publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Compute release version
        shell: bash
        run: |
          RELEASE_VERSION="${{ needs.prepare-release.outputs.release_version }}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          echo "Using release version $RELEASE_VERSION"

      - name: Update manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$RELEASE_VERSION"
          TAG="app-v$VERSION"
          
          echo "Updating manifest for version $VERSION ($TAG)"
          
          # Wait for GitHub to process the assets and release metadata
          RELEASE_INFO=""
          for attempt in 1 2 3 4 5 6 7 8; do
            if RELEASE_INFO=$(gh api repos/${{ github.repository }}/releases/tags/$TAG 2>/dev/null); then
              ASSET_COUNT=$(echo "$RELEASE_INFO" | jq '.assets | length')
              if [ "$ASSET_COUNT" -gt 0 ]; then
                echo "Release metadata ready on attempt $attempt with $ASSET_COUNT asset(s)"
                break
              fi
            fi

            if [ "$attempt" -eq 8 ]; then
              echo "::error::Release assets were not ready in time for $TAG"
              exit 1
            fi

            echo "Release assets not ready yet for $TAG, retrying in 15 seconds (attempt $attempt/8)"
            sleep 15
          done
          
          # Debug: List all assets found
          echo "=== Found Release Assets ==="
          echo "$RELEASE_INFO" | jq -r '.assets[] | .name' | sort
          echo "==========================="
          
          # Check if we have signature files
          SIG_COUNT=$(echo "$RELEASE_INFO" | jq '[.assets[] | select(.name | endswith(".sig"))] | length')
          echo "Found $SIG_COUNT signature files"
          
          if [ "$SIG_COUNT" -eq "0" ]; then
            echo "::warning::No signature files found! The TAURI_SIGNING_PRIVATE_KEY may not be configured correctly."
            echo "Auto-updates will NOT work without signed builds."
            echo "Please add TAURI_SIGNING_PRIVATE_KEY to your GitHub repository secrets."
            echo ""
            echo "To generate a signing key, run:"
            echo "  npx @tauri-apps/cli signer generate -w ~/.tauri/brows3.key"
            echo ""
            echo "Then add the private key contents to TAURI_SIGNING_PRIVATE_KEY secret,"
            echo "and update the pubkey in tauri.conf.json plugins.updater.pubkey"
          fi
          
          # Start building the platforms object
          PLATFORMS="{}"
          
          # Function to add platform
          add_platform() {
            local PLATFORM=$1
            local PATTERN=$2
            local SIG_PATTERN=$3
            
            # Find the asset URL
            ASSET_URL=$(echo "$RELEASE_INFO" | jq -r --arg pattern "$PATTERN" '.assets[] | select(.name | test($pattern; "i")) | .browser_download_url' | head -1)
            
            if [ -n "$ASSET_URL" ] && [ "$ASSET_URL" != "null" ]; then
              echo "Found $PLATFORM asset: $(basename "$ASSET_URL")"
              
              # Download the signature
              SIG_URL=$(echo "$RELEASE_INFO" | jq -r --arg pattern "$SIG_PATTERN" '.assets[] | select(.name | test($pattern; "i")) | .browser_download_url' | head -1)
              
              if [ -n "$SIG_URL" ] && [ "$SIG_URL" != "null" ]; then
                SIG=$(curl -sL "$SIG_URL")
                # Escape quotes in signature just in case
                SIG=$(echo "$SIG" | jq -R '.')
                # Remove enclosing quotes from jq output as we construct JSON manually/jq
                SIG="${SIG%\"}"
                SIG="${SIG#\"}"
                
                PLATFORMS=$(echo "$PLATFORMS" | jq --arg p "$PLATFORM" --arg u "$ASSET_URL" --arg s "$SIG" '.[$p] = {"url": $u, "signature": $s}')
                echo "✅ Added $PLATFORM with signature"
              else
                 echo "⚠️ Found asset for $PLATFORM but missing signature file"
              fi
            else
               echo "❌ Could not find asset for $PLATFORM (pattern: $PATTERN)"
            fi
          }
          
          # Add each platform - Updated patterns to match Tauri v2 naming
          # macOS Apple Silicon (aarch64) - matches Brows3_aarch64.app.tar.gz
          add_platform "darwin-aarch64" "_aarch64\\.app\\.tar\\.gz$" "_aarch64\\.app\\.tar\\.gz\\.sig$"
          
          # macOS Intel (x64) - matches Brows3_x64.app.tar.gz  
          add_platform "darwin-x86_64" "_x64\\.app\\.tar\\.gz$" "_x64\\.app\\.tar\\.gz\\.sig$"
          
          # Linux (AppImage) - matches Brows3_<version>_amd64.AppImage
          add_platform "linux-x86_64" "_amd64\\.AppImage$" "_amd64\\.AppImage\\.sig$"

          # Linux ARM64 (AppImage) - matches Brows3_<version>_arm64.AppImage or _aarch64.AppImage
          add_platform "linux-aarch64" "_(arm64|aarch64)\\.AppImage$" "_(arm64|aarch64)\\.AppImage\\.sig$"
          
          # Windows (NSIS) - matches Brows3_<version>_x64-setup.exe
          add_platform "windows-x86_64" "_x64-setup\\.exe$" "_x64-setup\\.exe\\.sig$"
          
          # Check if we have any platforms
          PLATFORM_COUNT=$(echo "$PLATFORMS" | jq 'keys | length')
          
          if [ "$PLATFORM_COUNT" -eq "0" ]; then
            echo "::error::No platforms could be added to update.json! Auto-updates will not work."
            echo "This usually means TAURI_SIGNING_PRIVATE_KEY is not set in GitHub secrets."
            exit 1
          else
            echo "Successfully added $PLATFORM_COUNT platforms to update manifest"
          fi
          
          # Build final update.json
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          cat > update.json << EOF
          {
            "version": "$VERSION",
            "notes": "See https://github.com/${{ github.repository }}/releases/tag/$TAG for release notes.",
            "pub_date": "$PUB_DATE",
            "platforms": $PLATFORMS
          }
          EOF
          
          # Pretty print
          cat update.json | jq . > update.json.tmp && mv update.json.tmp update.json
          
          echo ""
          echo "=== Final update.json ==="
          cat update.json
          echo "========================="
          
          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          git diff --cached --quiet || (git commit -m "chore: update auto-update manifest to v$VERSION" && git push origin main)
